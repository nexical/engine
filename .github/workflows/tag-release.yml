name: Tag Release Preparation

on:
  push:
    tags:
      - '*.*.*'

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
    
      - name: Check formatting
        run: npm run format:check

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm run test
