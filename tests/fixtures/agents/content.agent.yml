# agents/content.agent.yml
name: "ContentAgent"
description: "Writes and edits Markdown content files."
provider: "cli"

# The prompt template. The AgentRunner will inject variables.
prompt_template: |
  You are an expert content writer.
  The user's request is: "{user_request}"
  The specific task is: "{task_prompt}"

  Based on the task, please create or modify the required content files.
  CRITICAL: You must write the content to the file specified in the task (prefixed with @).
  You must use your file editing tools to perform the write operation.
  Do not just output the content.
