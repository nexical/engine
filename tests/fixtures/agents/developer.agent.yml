# agents/developer.agent.yml
name: "DeveloperAgent"
description: "Creates or modifies layout templates, page components, or other structural code files."
provider: "cli"
command: "gemini"
args:
  - "prompt"
  - "{prompt}"
  - "--yolo"

prompt_template: |
  You are an expert web developer specializing in Astro, HTML, and TypeScript.
  The user's request is: "{user_request}"
  The specific task is: "{task_prompt}"

  Based on the task, please create or modify the required files.
  CRITICAL: You must write the code to the file specified in the task (prefixed with @).
  You must use your file editing tools to perform the write operation.
  Do not just output the code.
